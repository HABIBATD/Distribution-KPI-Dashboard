
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distribution KPI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-primary': '#0052cc',
              'brand-secondary': '#172b4d',
              'brand-light': '#f4f5f7',
              'brand-accent': '#4c9aff',
              // New dashboard colors
              'dash-green': '#28a745',
              'dash-red': '#dc3545',
              'dash-orange': '#fd7e14',
              'dash-yellow': '#ffc107',
              'dash-blue': '#007bff',
              'dash-teal': '#17a2b8',
            },
             animation: {
                'gradient-bg': 'gradient-bg 15s ease infinite',
            },
            keyframes: {
                'gradient-bg': {
                    '0%, 100%': {
                        'background-position': '0% 50%',
                    },
                    '50%': {
                        'background-position': '100% 50%',
                    },
                },
            },
            backgroundImage: {
              'animated-gradient-dark': 'linear-gradient(-45deg, #0f172a, #1e293b, #0369a1, #1d4ed8, #4f46e5)',
              'animated-gradient-sunset': 'linear-gradient(-45deg, #ff7e5f, #feb47b, #ff6a00, #ee0979, #f7971e)',
              'animated-gradient-ocean': 'linear-gradient(-45deg, #00c6ff, #0072ff, #237A57, #093028, #16222A)',
              'animated-gradient-forest': 'linear-gradient(-45deg, #134E5E, #71B280, #56ab2f, #a8e063, #2E3136)',
              'animated-gradient-cosmic': 'linear-gradient(-45deg, #0F2027, #203A43, #2C5364, #1D2B64)',
              'animated-gradient-blush': 'linear-gradient(-45deg, #B24592, #F15F79, #ff9a9e, #fad0c4)',
            },
            backgroundSize: {
              '400%': '400% 400%',
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "papaparse": "https://esm.sh/papaparse@^5.5.3",
    "react-csv": "https://esm.sh/react-csv@^2.2.2",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "marked": "https://esm.sh/marked@^17.0.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
